<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#9881; מנהל משחק פסח 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:#FFD700;font-family:Arial,sans-serif;padding:14px;max-width:680px;margin:0 auto;}
h1{font-size:22px;text-align:center;padding:10px 0;text-shadow:0 0 12px #FFD700;}
.card{background:#222;border-radius:12px;padding:16px;margin-bottom:14px;}
.card h2{font-size:15px;margin-bottom:10px;color:#aaa;border-bottom:1px solid #333;padding-bottom:6px;}
button{padding:10px 16px;font-size:14px;border-radius:8px;border:2px solid #FFD700;background:#000;color:#FFD700;cursor:pointer;font-weight:bold;width:100%;margin-bottom:8px;}
button:hover{background:#FFD700;color:#000;}
button.green{border-color:#44ff88;color:#44ff88;}button.green:hover{background:#44ff88;color:#000;}
button.red{border-color:#ff5555;color:#ff5555;}button.red:hover{background:#ff5555;color:#000;}
button.orange{border-color:#ff9900;color:#ff9900;}button.orange:hover{background:#ff9900;color:#000;}
button.gray{border-color:#666;color:#888;}button.gray:hover{background:#444;color:#fff;}
#link-display{background:#000;border:1px solid #444;border-radius:8px;padding:10px;word-break:break-all;font-size:13px;color:#888;margin-bottom:8px;}
table{width:100%;border-collapse:collapse;}
th{text-align:right;padding:8px 10px;border-bottom:1px solid #444;color:#777;font-size:12px;font-weight:normal;}
td{padding:8px 10px;border-bottom:1px solid #2a2a2a;font-size:14px;vertical-align:middle;}
.score{color:#FFD700;font-weight:bold;}
.stages-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.sbtn{padding:6px 10px;border-radius:7px;border:1.5px solid #444;background:#1a1a1a;color:#666;cursor:pointer;font-size:12px;font-family:Arial;white-space:nowrap;}
.sbtn:hover{border-color:#888;color:#aaa;}
.sbtn.active{border-color:#FFD700;color:#FFD700;background:#2a2000;font-weight:bold;}
.sbtn.done2{border-color:#44ff88;color:#44ff88;background:#002200;}
#timer{font-size:52px;font-weight:bold;text-align:center;color:#FFD700;text-shadow:0 0 14px #FFD700;padding:6px;min-height:70px;letter-spacing:2px;}
#timer.red{color:#ff5555;text-shadow:0 0 14px #ff5555;animation:blink 0.5s infinite;}
@keyframes blink{50%{opacity:0.5;}}
#cur-stage-name{color:#FFD700;font-size:15px;text-align:center;margin-bottom:6px;min-height:22px;font-weight:bold;}
.del-btn{background:#330000;border:1px solid #ff5555;color:#ff5555;padding:4px 9px;font-size:12px;border-radius:6px;cursor:pointer;width:auto;margin:0;}
.del-btn:hover{background:#ff5555;color:#000;}
#winner-box{font-size:17px;text-align:center;padding:10px;color:#FFD700;min-height:26px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
</style>
</head>
<body>
<h1>&#9881; לוח מנהל — פסח 2026</h1>

<div class="card">
  <h2>&#128279; לינק לשחקנים</h2>
  <div id="link-display">טוען...</div>
  <button onclick="copyLink()">&#128203; העתק לינק</button>
</div>

<div class="card">
  <h2>&#127918; בחר שלב להפעיל</h2>
  <div class="stages-grid" id="sgrid"></div>
  <div id="cur-stage-name">בחר שלב למעלה</div>
  <div id="timer"></div>
  <div class="two-col">
    <button class="green" onclick="startStage()">&#9654; התחל שלב</button>
    <button class="red" onclick="endStage()">&#9632; סיים שלב</button>
  </div>
  <button class="orange" onclick="showLeader()">&#128293; הצג מוביל לכולם</button>
  <button class="gray" onclick="resetAll()">&#128260; איפוס מלא</button>
</div>

<div class="card">
  <h2>&#128101; שחקנים <span id="pcount" style="color:#aaa;font-size:12px;font-weight:normal;"></span></h2>
  <table>
    <thead><tr><th>#</th><th>שם</th><th>ניקוד</th><th>סטטוס</th><th>הסר</th></tr></thead>
    <tbody id="ptable"></tbody>
  </table>
</div>

<div class="card">
  <h2>&#127942; מוביל / מנצח</h2>
  <div id="winner-box"></div>
</div>

<script>
var FB="https://game-for-passover-2026-default-rtdb.firebaseio.com";
var playerUrl=window.location.href.replace("admin.html","player.html");
document.getElementById("link-display").textContent=playerUrl;

var STAGES=[
  {id:1,  name:"\uD83E\uDE78 דם — משחק זיכרון"},
  {id:2,  name:"\uD83D\uDC38 צפרדע — קפיצות"},
  {id:3,  name:"\uD83E\uDD7F כינים — פיצוץ כינים"},
  {id:4,  name:"\uD83E\uDD81 ערוב — בריחה מחיות"},
  {id:5,  name:"\uD83D\uDC04 דבר — מצא הפרה הנגועה"},
  {id:6,  name:"\uD83E\uDE78 שחין — טריוויה"},
  {id:7,  name:"\uD83C\uDF28 ברד — פאק-מן"},
  {id:8,  name:"\uD83E\uDEB2 ארבה — ירי חלליות"},
  {id:9,  name:"\uD83C\uDF11 חושך — מבוך"},
  {id:10, name:"\uD83D\uDCDC בכורות — טריוויה"}
];

var curStage=1, timerSec=60, timerInt=null, doneStages={};

function copyLink(){
  if(navigator.clipboard)navigator.clipboard.writeText(playerUrl).then(function(){alert("\u2705 הלינק הועתק!");});
  else prompt("העתק:",playerUrl);
}

function fbGet(p,cb){fetch(FB+p+".json").then(function(r){return r.json();}).then(cb).catch(function(){});}
function fbSet(p,d){fetch(FB+p+".json",{method:"PUT",body:JSON.stringify(d)}).catch(function(){});}
function fbDel(p){fetch(FB+p+".json",{method:"DELETE"}).catch(function(){});}
function fbPatch(p,d){fetch(FB+p+".json",{method:"PATCH",body:JSON.stringify(d)}).catch(function(){});}

function buildGrid(){
  var g=document.getElementById("sgrid");g.innerHTML="";
  STAGES.forEach(function(s){
    var b=document.createElement("button");
    b.className="sbtn"+(s.id===curStage?" active":"")+(doneStages[s.id]?" done2":"");
    b.innerHTML=(doneStages[s.id]?"\u2705 ":"")+s.id+". "+s.name.split(" \u2014 ")[0].split(" ").slice(1).join(" ");
    b.onclick=(function(sid){return function(){curStage=sid;buildGrid();showCurName();};})(s.id);
    g.appendChild(b);
  });
  showCurName();
}

function showCurName(){
  document.getElementById("cur-stage-name").textContent="\u25B6 "+STAGES[curStage-1].name;
}

buildGrid();

function startTimer(){
  clearInterval(timerInt);timerSec=60;updTimer();
  timerInt=setInterval(function(){
    timerSec--;updTimer();
    if(timerSec<=0){clearInterval(timerInt);endStage();}
  },1000);
}

function updTimer(){
  var el=document.getElementById("timer");
  el.textContent=timerSec>9?timerSec+"s":"0"+timerSec+"s";
  el.className=timerSec<=10?"red":"";
}

function startStage(){
  if(!confirm("\u25B6 להתחיל: "+STAGES[curStage-1].name+"?"))return;
  // Reset all players stage status
  fbGet("/players",function(data){
    if(data){Object.keys(data).forEach(function(id){fbPatch("/players/"+id,{stageDone:false,stageScore:0});});}
  });
  fbSet("/currentStage",curStage);
  fbSet("/gameStatus","playing");
  fbSet("/stageStartedAt",Date.now());
  startTimer();
  document.getElementById("timer").textContent="60s";
}

function endStage(){
  clearInterval(timerInt);
  document.getElementById("timer").textContent="";
  document.getElementById("timer").className="";
  fbSet("/gameStatus","ended");
  doneStages[curStage]=true;
  // Auto advance
  if(curStage<10){curStage++;}
  buildGrid();
}

function resetAll(){
  if(!confirm("\u26A0 לאפס הכל?"))return;
  clearInterval(timerInt);
  fbSet("/gameStatus","waiting");
  fbSet("/currentStage",0);
  fbSet("/players",null);
  fbSet("/showLeader",null);
  document.getElementById("timer").textContent="";
  document.getElementById("ptable").innerHTML="";
  document.getElementById("winner-box").textContent="";
  curStage=1;doneStages={};buildGrid();
}

function showLeader(){
  fbGet("/players",function(data){
    if(!data){alert("אין שחקנים");return;}
    var pl=Object.entries(data).map(function(e){return{name:e[1].name,score:e[1].score||0};});
    pl.sort(function(a,b){return b.score-a.score;});
    if(pl.length>0){
      fbSet("/showLeader",{name:pl[0].name,score:pl[0].score,ts:Date.now()});
      alert("\uD83C\uDFC6 "+pl[0].name+" — מוצג לכולם!");
    }
  });
}

function removePlayer(pid,name){
  if(!confirm("\uD83D\uDDD1 למחוק את "+name+"?"))return;
  fbDel("/players/"+pid);
}

var medals=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"];

function loadPlayers(){
  fbGet("/players",function(data){
    var tbody=document.getElementById("ptable");
    var wb=document.getElementById("winner-box");
    var pc=document.getElementById("pcount");
    tbody.innerHTML="";
    if(!data){pc.textContent="(0)";wb.textContent="";return;}
    var pl=Object.entries(data).map(function(e){
      return{id:e[0],name:e[1].name,score:e[1].score||0,done:e[1].stageDone};
    });
    pl.sort(function(a,b){return b.score-a.score;});
    pc.textContent="("+pl.length+" משתתפים)";
    pl.forEach(function(p,i){
      var tr=document.createElement("tr");
      var rank=medals[i]||("#"+(i+1));
      tr.innerHTML="<td>"+rank+"</td>"
        +"<td>"+p.name+"</td>"
        +"<td class='score'>"+p.score+"</td>"
        +"<td style='color:"+(p.done?"#44ff88":"#888")+"'>"+(p.done?"\u2705":"\u23F3")+"</td>"
        +"<td><button class='del-btn' onclick=\"removePlayer('"+p.id+"','"+p.name+"')\">\uD83D\uDDD1</button></td>";
      tbody.appendChild(tr);
    });
    if(pl.length>0){
      var done=pl.filter(function(p){return p.done;}).length;
      if(done===pl.length&&pl.length>1){
        wb.innerHTML="\uD83C\uDFC6 מוביל: <strong>"+pl[0].name+"</strong> — "+pl[0].score+" נק'";
      } else {
        wb.textContent=done+"/"+pl.length+" סיימו | מוביל: "+(pl[0]?pl[0].name+" ("+pl[0].score+")":"");
      }
    }
  });
}

setInterval(loadPlayers,2000);
loadPlayers();
</script>
</body>
</html>
