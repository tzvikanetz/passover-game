<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>משחק פסח 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:#FFD700;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:8px;overflow-x:hidden;}
h1{font-size:20px;text-align:center;padding:8px 0 2px;text-shadow:0 0 12px #FFD700;}
.screen{width:100%;max-width:440px;display:none;flex-direction:column;align-items:center;gap:8px;}
.screen.active{display:flex!important;}
input[type=text]{width:100%;padding:12px;font-size:18px;border-radius:8px;border:2px solid #FFD700;background:#222;color:#FFD700;text-align:center;}
.btn{width:100%;padding:12px;font-size:15px;border-radius:8px;border:2px solid #FFD700;background:#000;color:#FFD700;cursor:pointer;font-weight:bold;text-align:center;}
.btn:hover,.btn:active{background:#FFD700;color:#000;}
.btn.green{border-color:#44ff88;color:#44ff88;}
.sub{color:#aaa;font-size:13px;text-align:center;}
#wait-players{width:100%;background:#222;border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;}
.pi{padding:5px 8px;border-bottom:1px solid #333;font-size:14px;}
/* TOPBAR */
#topbar{display:flex;justify-content:space-between;width:100%;max-width:440px;font-size:13px;padding:2px 4px;margin-bottom:2px;}
#gtimer{font-size:22px;font-weight:bold;color:#FFD700;}
#gtimer.red{color:#ff5555;}
/* STAGE TITLE */
#stage-title{font-size:18px;font-weight:bold;text-align:center;color:#FFD700;text-shadow:0 0 8px #FFD700;padding:4px;}
/* LEADERBOARD */
#leaderboard{width:100%;background:#222;border-radius:10px;padding:8px;}
.lb-row{display:flex;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #333;font-size:14px;align-items:center;}
.lb-row.me{background:#FFD70022;border-radius:6px;}
.lb-rank{min-width:34px;}
.lb-name{flex:1;padding:0 6px;}
.lb-score{font-weight:bold;color:#FFD700;}
#winner-banner{font-size:18px;text-align:center;padding:10px;color:#FFD700;text-shadow:0 0 10px #FFD700;min-height:28px;}

/* ===== GAME 1: MEMORY ===== */
#memory-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:360px;}
.mem-card{aspect-ratio:1;background:#333;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:2px solid #555;transition:transform 0.1s;user-select:none;}
.mem-card.flipped{background:#2a2000;border-color:#FFD700;}
.mem-card.matched{background:#002200;border-color:#44ff88;pointer-events:none;}
.mem-card.back{font-size:22px;}
#mem-score-disp{font-size:18px;font-weight:bold;color:#FFD700;}

/* ===== GAME 2: FROG ===== */
#frog-canvas{display:block;border-radius:8px;background:#1a3a1a;touch-action:none;}
#frog-dpad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px 54px;gap:4px;margin:6px 0;}
.fdb{background:#222;border:2px solid #44ff8899;border-radius:10px;color:#44ff88;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;}
.fdb:active{background:#44ff8833;}
.fde{background:transparent;border:none;}

/* ===== GAME 3: LICE ===== */
#lice-canvas{display:block;border-radius:8px;touch-action:none;}

/* ===== GAME 4: AROV ===== */
#arov-canvas{display:block;border-radius:8px;background:#2a1a00;}
#arov-dpad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px 54px;gap:4px;margin:6px 0;}
.adb{background:#222;border:2px solid #FFD70099;border-radius:10px;color:#FFD700;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;}
.adb:active{background:#FFD70033;}
.ade{background:transparent;border:none;}

/* ===== GAME 5: COW ===== */
#cow-canvas{display:block;border-radius:8px;background:#226622;touch-action:none;}

/* ===== GAME 6 & 10: TRIVIA ===== */
#trivia-q{font-size:17px;text-align:center;background:#222;border-radius:10px;padding:14px;line-height:1.5;width:100%;}
#trivia-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.t-opt{padding:14px 8px;font-size:14px;border-radius:8px;cursor:pointer;text-align:center;font-weight:bold;border:2px solid #555;background:#222;color:#fff;user-select:none;}
.t-opt:active{opacity:0.8;}
.t-opt.correct{background:#004400;border-color:#44ff88;color:#44ff88;}
.t-opt.wrong{background:#440000;border-color:#ff5555;color:#ff5555;}
.t-opt.reveal{background:#003300;border-color:#44ff88;}
#trivia-result{font-size:16px;text-align:center;min-height:22px;padding:4px;}
#trivia-progress{color:#aaa;font-size:13px;text-align:center;}

/* ===== GAME 7: PACMAN ===== */
#pac-canvas{display:block;border-radius:6px;background:#000;}
#pac-dpad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px 54px;gap:4px;margin:6px 0;}
.pdb{background:#222;border:2px solid #FFD70099;border-radius:10px;color:#FFD700;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;}
.pdb:active{background:#FFD70033;}
.pde{background:transparent;border:none;}

/* ===== GAME 8: SPACE ===== */
#space-canvas{display:block;border-radius:8px;background:#000;}

/* ===== GAME 9: MAZE ===== */
#maze-canvas{display:block;border-radius:8px;background:#111;}
#maze-dpad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px 54px;gap:4px;margin:6px 0;}
.mdb{background:#222;border:2px solid #aaaaff99;border-radius:10px;color:#aaaaff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:none;}
.mdb:active{background:#aaaaff33;}
.mde{background:transparent;border:none;}

/* WINNER OVERLAY */
#winner-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
#winner-overlay.show{display:flex;}
#wo-title{font-size:28px;font-weight:bold;color:#FFD700;text-shadow:0 0 20px #FFD700;margin-bottom:10px;}
#wo-name{font-size:42px;font-weight:bold;color:#FFD700;text-shadow:0 0 30px #FFD700;margin:10px 0;}
#wo-img{font-size:100px;margin:10px 0;}
#wo-score{font-size:22px;color:#aaa;}
</style>
</head>

<script>
var FB="https://game-for-passover-2026-default-rtdb.firebaseio.com";
var FAMILY_PHOTOS=["photo1.jpeg","photo2.jpeg","photo3.jpg","photo4.jpeg","photo5.jpeg","photo6.jpg","photo7.jpeg","photo8.jpeg","photo9.jpeg","photo10.jpeg"];
var _photoIdx=0;
function showNextPhoto(imgId){var el=document.getElementById(imgId);if(el){el.src=FAMILY_PHOTOS[_photoIdx%FAMILY_PHOTOS.length];_photoIdx++;}}
var MUS={ac:null,nodes:[],playing:false};
function getAC(){if(!MUS.ac)MUS.ac=new(window.AudioContext||window.webkitAudioContext)();return MUS.ac;}
function stopMusic(){MUS.nodes.forEach(function(n){try{n.stop();}catch(e){}});MUS.nodes=[];MUS.playing=false;}
function playNote(f,t,d,type,v){try{var ac=getAC();var o=ac.createOscillator();var g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type||"square";o.frequency.value=f;v=v||0.05;g.gain.setValueAtTime(v,ac.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+d*0.85);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+d);MUS.nodes.push(o);}catch(e){}}
function playHavaNagila(){stopMusic();MUS.playing=true;var ns=[[329,.18],[349,.18],[392,.18],[415,.36],[392,.18],[349,.18],[329,.36],[311,.18],[329,.36],[329,.18],[349,.18],[392,.18],[440,.36],[440,.18],[494,.18],[523,.36],[494,.18],[440,.18],[415,.18],[392,.18],[329,.54],[329,.18],[311,.18],[294,.18],[329,.54],[349,.18],[329,.18],[311,.18],[294,.36],[277,.18],[294,.18],[329,.72]];var t=0;ns.forEach(function(n){playNote(n[0],t,n[1],"square",0.05);t+=n[1]+0.015;});if(MUS.playing)setTimeout(function(){if(MUS.playing)playHavaNagila();},(t+0.3)*1000);}
function playRetroLoop(){stopMusic();MUS.playing=true;var mel=[[523,.1],[659,.1],[784,.1],[1047,.1],[784,.1],[659,.1],[523,.1],[494,.1],[523,.1],[587,.1],[659,.1],[698,.1],[784,.2],[698,.1],[659,.1],[587,.1],[523,.2],[440,.1],[494,.1],[523,.1],[587,.1],[659,.1],[784,.1],[880,.2],[784,.1],[659,.1],[587,.1],[523,.3]];var bas=[[131,.4],[147,.4],[165,.4],[175,.4],[196,.4],[175,.4],[165,.4],[147,.8]];var t=0;mel.forEach(function(n){playNote(n[0],t,n[1],"square",0.05);t+=n[1]+0.01;});var bt=0;bas.forEach(function(n){playNote(n[0],bt,n[1],"triangle",0.04);bt+=n[1];});if(MUS.playing)setTimeout(function(){if(MUS.playing)playRetroLoop();},(t+0.2)*1000);}
function playTriviaMusic(){stopMusic();MUS.playing=true;var ns=[[392,.3],[440,.3],[494,.3],[523,.6],[494,.3],[440,.3],[392,.6],[349,.3],[392,.3],[440,.3],[494,.6],[440,.3],[392,.3],[349,.9]];var t=0;ns.forEach(function(n){playNote(n[0],t,n[1],"sine",0.06);t+=n[1]+0.05;});if(MUS.playing)setTimeout(function(){if(MUS.playing)playTriviaMusic();},(t+0.2)*1000);}
function playSuspenseMusic(){stopMusic();MUS.playing=true;var ns=[[220,.4],[233,.4],[220,.4],[207,.4],[196,.4],[207,.4],[220,.8],[233,.4],[246,.4],[233,.4],[220,.4],[207,.4],[196,.4],[185,1.2]];var t=0;ns.forEach(function(n){playNote(n[0],t,n[1],"sawtooth",0.04);t+=n[1]+0.02;});if(MUS.playing)setTimeout(function(){if(MUS.playing)playSuspenseMusic();},(t+0.2)*1000);}

var myName="",myId="",myScore=0,myStageScore=0;
var gSt="idle",timerSec=60,timerInt=null,gameLoopTimer=null;
var curStageId=0;

// ── Firebase ──────────────────────────────────────────────────
function fbGet(p,cb){fetch(FB+p+".json").then(function(r){return r.json();}).then(cb).catch(function(){});}
function fbSet(p,d){fetch(FB+p+".json",{method:"PUT",body:JSON.stringify(d)}).catch(function(){});}
function fbPush(p,d){return fetch(FB+p+".json",{method:"POST",body:JSON.stringify(d)}).then(function(r){return r.json();});}
function fbPatch(p,d){fetch(FB+p+".json",{method:"PATCH",body:JSON.stringify(d)}).catch(function(){});}

// ── Screens ───────────────────────────────────────────────────
function show(id){
  ["screen-join","screen-wait","screen-game","screen-results"].forEach(function(s){
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

// ── Join ──────────────────────────────────────────────────────
function joinGame(){
  var n=document.getElementById("name-input").value.trim();
  if(!n){alert("נא להכניס שם!");return;}
  myName=n;
  fbPush("/players",{name:n,score:0,stageDone:false,joinedAt:Date.now()}).then(function(r){
    myId=r.name;show("screen-wait");showNextPhoto("wait-photo");
    document.getElementById("pname-disp").textContent=n;
    pollPlayers();pollStatus();
  });
}

function pollPlayers(){
  if(!document.getElementById("screen-wait").classList.contains("active"))return;
  fbGet("/players",function(data){
    var el=document.getElementById("wait-players");el.innerHTML="";
    if(data)Object.values(data).forEach(function(p){
      var d=document.createElement("div");d.className="pi";
      d.textContent=(p.name===myName?"\u25B6 ":"")+p.name;el.appendChild(d);

function pollStatus(){
  fbGet("/gameStatus",function(s){
    if(s==="playing"){
      fbGet("/currentStage",function(sid){
        if(sid!==curStageId){curStageId=sid;launchStage(sid);}
        else{setTimeout(pollStatus,1500);}
      });
    } else if(s==="ended"){
      stopGameLoop();showResults();

      setTimeout(pollStatus,1500);
    }
  });
}

function pollDuringGame(){
  fbGet("/gameStatus",function(s){
    if(s==="ended"){stopGameLoop();showResults();}
    else if(gSt==="playing"){setTimeout(pollDuringGame,2000);}
  });
  // Check for leader display
  fbGet("/showLeader",function(data){
    if(data&&data.ts&&Date.now()-data.ts<5000){showWinnerOverlay(data.name,data.score);}
  });
}

// ── Timer ─────────────────────────────────────────────────────
function startClientTimer(){
  clearInterval(timerInt);timerSec=60;updTimer();
  timerInt=setInterval(function(){
    timerSec--;updTimer();
    if(timerSec<=0){clearInterval(timerInt);finishStage();}
  },1000);
}
function updTimer(){
  var el=document.getElementById("gtimer");
  el.textContent=timerSec+"s";
  el.className=timerSec<=10?"red":"";
}
function stopGameLoop(){
  clearInterval(timerInt);
  if(gameLoopTimer)clearTimeout(gameLoopTimer);
  gSt="done";
}

// ── Launch Stage ──────────────────────────────────────────────
var STAGE_NAMES=["","דם — משחק זיכרון","צפרדע — קפיצות","כינים — פיצוץ","ערוב — בריחה","דבר — פרה נגועה","שחין — טריוויה","ברד — פאק-מן","ארבה — חלליות","חושך — מבוך","בכורות — טריוויה"];
var STAGE_EMOJIS=["","\uD83E\uDE78","\uD83D\uDC38","\uD83E\uDD7F","\uD83E\uDD81","\uD83D\uDC04","\uD83E\uDE78","\uD83C\uDF28","\uD83E\uDEB2","\uD83C\uDF11","\uD83D\uDCDC"];

function launchStage(sid){
  show("screen-game");
  gSt="playing";myStageScore=0;
  document.getElementById("stage-title").textContent=STAGE_EMOJIS[sid]+" "+STAGE_NAMES[sid];
  document.getElementById("stage-disp").textContent="שלב "+sid+"/10";
  var area=document.getElementById("game-area");area.innerHTML="";
  startClientTimer();
  pollDuringGame();
  stopMusic();
  switch(sid){
    case 1:playHavaNagila();initMemory(area);break;
    case 2:playRetroLoop();initFrog(area);break;
    case 3:playRetroLoop();initLice(area);break;
    case 4:playRetroLoop();initArov(area);break;
    case 5:playHavaNagila();initCow(area);break;
    case 6:playRetroLoop();initShechin(area);break;
    case 7:initPacman(area);break;
    case 8:playRetroLoop();initSpace(area);break;
    case 9:playSuspenseMusic();initMaze(area);break;
    case 10:playTriviaMusic();initTrivia(area,10);break;
  }
}

function addScore(pts){
  myStageScore+=pts;
  myScore+=pts;
  fbPatch("/players/"+myId,{score:myScore,stageScore:myStageScore});
}

function finishStage(){
  if(gSt==="done")return;
  stopGameLoop();stopMusic();
  fbPatch("/players/"+myId,{score:myScore,stageScore:myStageScore,stageDone:true});
  showResults();
}

function showResults(){

    fbGet("/gameStatus",function(s){

function refreshLB(){

function initMemory(area){
  var plagues=[
    {emoji:"\uD83E\uDE78",name:"דם"},
    {emoji:"\uD83D\uDC38",name:"צפרדע"},
    {emoji:"\uD83E\uDD7F",name:"כינים"},
    {emoji:"\uD83E\uDD81",name:"ערוב"},
    {emoji:"\uD83D\uDC04",name:"דבר"},
    {emoji:"\uD83E\uDE79",name:"שחין"},
    {emoji:"\uD83C\uDF28",name:"ברד"},
    {emoji:"\uD83E\uDEB2",name:"ארבה"},
    {emoji:"\uD83C\uDF11",name:"חושך"},
    {emoji:"\uD83D\uDC66\uD83C\uDFFB",name:"מכת בכורות"}
  ];
  var pairs=[];
  plagues.forEach(function(p,i){pairs.push({id:i,emoji:p.emoji,name:p.name});pairs.push({id:i,emoji:p.emoji,name:p.name});});
  // shuffle
  for(var i=pairs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pairs[i];pairs[i]=pairs[j];pairs[j]=t;}

  var scoreEl=document.createElement("div");scoreEl.id="mem-score-disp";scoreEl.textContent="ניקוד: 0";
  area.appendChild(scoreEl);

  var grid=document.createElement("div");grid.id="memory-grid";area.appendChild(grid);

  var flipped=[],matched=0,canFlip=true,memScore=0;
  pairs.forEach(function(p,idx){
    var card=document.createElement("div");
    card.className="mem-card";
    card.dataset.id=p.id;
    card.dataset.emoji=p.emoji;
    card.textContent="\uD83C\uDDEE\uD83C\uDDF1"; // Israel flag as back
    card.style.fontSize="20px";
    card.onclick=function(){
      if(!canFlip||card.classList.contains("matched")||card.classList.contains("flipped"))return;
      card.textContent=p.emoji;card.style.fontSize="28px";
      card.classList.add("flipped");
      flipped.push({card:card,id:p.id});
      if(flipped.length===2){
        canFlip=false;
        setTimeout(function(){
          if(flipped[0].id===flipped[1].id){
            flipped[0].card.classList.add("matched");
            flipped[1].card.classList.add("matched");
            matched++;
            var timeBonus=Math.floor(timerSec*1.5);
            var pts=20+timeBonus;
            memScore+=pts;addScore(pts);
            scoreEl.textContent="ניקוד: "+myStageScore+" (+"+pts+")";
            if(matched===10){var finalBonus=Math.floor(timerSec*3);addScore(finalBonus);scoreEl.textContent="ניקוד: "+myStageScore+" +"+finalBonus+" מהירות!";}
          } else {
            flipped[0].card.textContent="\uD83C\uDDEE\uD83C\uDDF1";flipped[0].card.style.fontSize="20px";
            flipped[0].card.classList.remove("flipped");
            flipped[1].card.textContent="\uD83C\uDDEE\uD83C\uDDF1";flipped[1].card.style.fontSize="20px";
            flipped[1].card.classList.remove("flipped");
          }
          flipped=[];canFlip=true;
        },900);
      }
    };
    grid.appendChild(card);
  });
}

// GAME 2: FROG
// ════════════════════════════════════════════════════════════
function initFrog(area){
  var W=320,H=360;
  var cv=document.createElement("canvas");cv.id="frog-canvas";cv.width=W;cv.height=H;
  var scoreEl=document.createElement("div");scoreEl.style.cssText="color:#44ff88;font-size:18px;font-weight:bold;";scoreEl.textContent="ניקוד: 0";
  area.appendChild(scoreEl);area.appendChild(cv);

  var dpad=document.createElement("div");dpad.id="frog-dpad";
  dpad.innerHTML="<div class='fde'></div><div class='fdb' id='fu'>&#9650;</div><div class='fde'></div><div class='fdb' id='fl'>&#9654;</div><div class='fde'></div><div class='fdb' id='fr'>&#9664;</div><div class='fde'></div><div class='fdb' id='fd'>&#9660;</div><div class='fde'></div>";
  area.appendChild(dpad);

  var ctx=cv.getContext("2d");
  var ROWS=6,CW=W,CH=H;
  var CELL=CH/ROWS;
  var frog={x:W/2,y:CH-CELL/2,size:CELL*0.45};
  var frogScore=0,crosses=0;

  // Logs: row -> array of logs
  var logs=[];
  var speeds=[1.0,1.5,1.1,1.7,1.3];
  var dirs=[1,-1,1,-1,1];
  var logW=90;
  for(var row=1;row<=5;row++){
    var arr=[];
    var cnt=2;
    for(var j=0;j<cnt;j++){arr.push({x:j*(W/cnt+10)+20,y:CELL*(row-0.5),w:logW,speed:speeds[row-1],dir:dirs[row-1]});}
    logs.push(arr);
  }

  var frogLives=3,frogInvincible=false,lastJump=0;
  var onLog=false,frogRunning=true;

  function moveFrog(dx,dy){
    var now=Date.now();if(now-lastJump<220)return;lastJump=now;
    var newX=Math.max(frog.size,Math.min(W-frog.size,frog.x+dx*CELL*0.9));
    var newY=Math.max(CELL/2,Math.min(CH-CELL/2,frog.y+dy*CELL*0.9));
    var targetRow=Math.round((CH-newY)/CELL);
    if(targetRow>=1&&targetRow<=5){
      var willLand=false;
      logs.forEach(function(arr){arr.forEach(function(lg){if(Math.abs(lg.y-(targetRow-0.5)*CELL)<CELL*0.5&&Math.abs(newX-lg.x)<lg.w/2+frog.size*0.5)willLand=true;});});
      if(!willLand&&!frogInvincible){frogLives--;frog.x=W/2;frog.y=CH-CELL/2;frogInvincible=true;setTimeout(function(){frogInvincible=false;},1500);return;}
    }
    frog.x=newX;frog.y=newY;
    if(frog.y<=CELL/2){crosses++;frogScore+=80;addScore(80);scoreEl.textContent="ניקוד: "+myStageScore;frog.x=W/2;frog.y=CH-CELL/2;}
  }

  document.getElementById("fu").ontouchstart=function(e){e.preventDefault();moveFrog(0,-1);};
  document.getElementById("fd").ontouchstart=function(e){e.preventDefault();moveFrog(0,1);};
  document.getElementById("fl").ontouchstart=function(e){e.preventDefault();moveFrog(1,0);};
  document.getElementById("fr").ontouchstart=function(e){e.preventDefault();moveFrog(-1,0);};
  document.getElementById("fu").onmousedown=function(){moveFrog(0,-1);};
  document.getElementById("fd").onmousedown=function(){moveFrog(0,1);};
  document.getElementById("fl").onmousedown=function(){moveFrog(1,0);};
  document.getElementById("fr").onmousedown=function(){moveFrog(-1,0);};

  function getRow(y){return Math.round((CH-y)/CELL);}

  function frogLoop(){
    if(!frogRunning)return;
    ctx.clearRect(0,0,W,H);
    // Draw river
    ctx.fillStyle="#1a3a1a";ctx.fillRect(0,0,W,H);
    // Banks
    ctx.fillStyle="#4a7a1a";ctx.fillRect(0,0,W,CELL*0.8);
    ctx.fillStyle="#4a7a1a";ctx.fillRect(0,CH-CELL*0.8,W,CELL*0.8);
    // Water rows
    for(var r=1;r<=5;r++){
      ctx.fillStyle=r%2===0?"#1a4a6a":"#1a3a5a";
      ctx.fillRect(0,CELL*(r-0.5)-2,W,CELL+4);
    }
    // Logs
    onLog=false;
    logs.forEach(function(arr,ri){
      arr.forEach(function(lg){
        lg.x+=lg.speed*lg.dir;
        if(lg.x>W+lg.w/2)lg.x=-lg.w/2;
        if(lg.x<-lg.w/2)lg.x=W+lg.w/2;
        ctx.fillStyle="#8B4513";ctx.beginPath();
        ctx.roundRect(lg.x-lg.w/2,lg.y-CELL*0.25,lg.w,CELL*0.5,8);ctx.fill();
        ctx.fillStyle="#A0522D";ctx.fillRect(lg.x-lg.w/2+6,lg.y-CELL*0.15,lg.w-12,CELL*0.3);
        // Check if frog on log
        var fr2=getRow(frog.y);
        if(fr2===ri+1){
          if(Math.abs(frog.x-lg.x)<lg.w/2+frog.size*0.5){
            frog.x+=lg.speed*lg.dir;onLog=true;
          }
        }
      });
    });
    var fr3=getRow(frog.y);
    if(fr3>=1&&fr3<=5&&!onLog&&!frogInvincible){frogLives--;frog.x=W/2;frog.y=CH-CELL/2;frogInvincible=true;setTimeout(function(){frogInvincible=false;},1500);}
    ctx.font="18px serif";ctx.textAlign="left";ctx.textBaseline="top";for(var li=0;li<frogLives;li++)ctx.fillText("\uD83D\uDC38",6+li*22,6);
    // Draw frog
    ctx.font=(frog.size*1.8)+"px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("\uD83D\uDC38",frog.x,frog.y);
    // Finish line flag
    ctx.font="18px serif";ctx.fillText("\uD83C\uDFC1",W/2,CELL*0.4);
    gameLoopTimer=requestAnimationFrame(frogLoop);
  }
  frogLoop();
  // Stop on finish
  var origStop=stopGameLoop;
  stopGameLoop=function(){frogRunning=false;if(gameLoopTimer)cancelAnimationFrame(gameLoopTimer);origStop();};
}

// ════════════════════════════════════════════════════════════
// GAME 3: LICE — Tap to pop
// ════════════════════════════════════════════════════════════
function initLice(area){
  var W=320,H=360;
  var cv=document.createElement("canvas");cv.id="lice-canvas";cv.width=W;cv.height=H;
  cv.style.background="#c8a882";
  var scoreEl=document.createElement("div");scoreEl.style.cssText="color:#FFD700;font-size:18px;font-weight:bold;";scoreEl.textContent="ניקוד: 0";
  area.appendChild(scoreEl);area.appendChild(cv);

  var ctx=cv.getContext("2d");
  var lice=[],liceScore=0,spawnRate=1500,lastSpawn=Date.now(),liceRunning=true;
  var missed=0;

  function spawnLouse(){
    lice.push({
      x:30+Math.random()*(W-60),
      y:30+Math.random()*(H-60),
      size:18+Math.random()*14,
      speed:0.5+Math.random()*1.5,
      dx:(Math.random()-0.5)*2,
      dy:(Math.random()-0.5)*2,
      alive:true,
      age:0
    });
  }

  function tapHandler(e){
    e.preventDefault();
    var rect=cv.getBoundingClientRect();
    var scaleX=W/rect.width,scaleY=H/rect.height;
    var cx,cy;
    if(e.touches){cx=(e.touches[0].clientX-rect.left)*scaleX;cy=(e.touches[0].clientY-rect.top)*scaleY;}
    else{cx=(e.clientX-rect.left)*scaleX;cy=(e.clientY-rect.top)*scaleY;}
    for(var i=lice.length-1;i>=0;i--){
      var l=lice[i];
      if(l.alive&&Math.hypot(cx-l.x,cy-l.y)<l.size*1.2){
        l.alive=false;lice.splice(i,1);
        var pts=Math.max(3,15-Math.floor(liceScore/30));
        liceScore+=pts;addScore(pts);
        scoreEl.textContent="ניקוד: "+myStageScore;
        break;
      }
    }
  }
  cv.addEventListener("touchstart",tapHandler,{passive:false});
  cv.addEventListener("mousedown",tapHandler);

  var liceRunLoop=true;
  function liceLoop(){
    if(!liceRunLoop)return;
    var now=Date.now();
    if(now-lastSpawn>spawnRate&&lice.length<18){
      spawnLouse();lastSpawn=now;
      spawnRate=Math.max(400,spawnRate-60);
    }
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#c8a882";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#3d1c02";ctx.beginPath();ctx.ellipse(W/2,H*.38,W*.38,H*.42,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#3d1c02";ctx.fillRect(W*.12,H*.35,W*.18,H*.5);ctx.fillRect(W*.7,H*.35,W*.18,H*.5);
    ctx.beginPath();ctx.ellipse(W/2,H*.75,W*.4,H*.15,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#f5c8a0";ctx.beginPath();ctx.ellipse(W/2,H*.38,W*.28,H*.32,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#3d1c02";ctx.beginPath();ctx.ellipse(W*.38,H*.34,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(W*.62,H*.34,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#c08060";ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H*.41,10,.2,Math.PI-.2);ctx.stroke();
    // Draw lice
    ctx.font="28px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    lice.forEach(function(l){
      if(!l.alive)return;
      l.x+=l.dx*l.speed;l.y+=l.dy*l.speed;
      if(l.x<l.size||l.x>W-l.size)l.dx*=-1;
      if(l.y<l.size||l.y>H-l.size)l.dy*=-1;
      l.age++;
      ctx.save();ctx.translate(l.x,l.y);
      ctx.font=l.size*1.4+"px serif";
      ctx.fillText("\uD83D\uDC1C",0,0);
      ctx.restore();
    });

    gameLoopTimer=requestAnimationFrame(liceLoop);
  }
  liceLoop();
  var origStop2=stopGameLoop;
  stopGameLoop=function(){liceRunLoop=false;if(gameLoopTimer)cancelAnimationFrame(gameLoopTimer);origStop2();};
}

// ════════════════════════════════════════════════════════════
// GAME 4: AROV — Collect coins, avoid beasts
// ════════════════════════════════════════════════════════════
function initArov(area){
  var W=320,H=360;
  var cv=document.createElement("canvas");cv.id="arov-canvas";cv.width=W;cv.height=H;
  var scoreEl=document.createElement("div");scoreEl.style.cssText="color:#FFD700;font-size:18px;font-weight:bold;";scoreEl.textContent="ניקוד: 0";
  area.appendChild(scoreEl);area.appendChild(cv);

  var dpad=document.createElement("div");dpad.id="arov-dpad";
  dpad.innerHTML="<div class='ade'></div><div class='adb' id='au'>&#9650;</div><div class='ade'></div><div class='adb' id='al'>&#9654;</div><div class='ade'></div><div class='adb' id='ar'>&#9664;</div><div class='ade'></div><div class='adb' id='ad'>&#9660;</div><div class='ade'></div>";
  area.appendChild(dpad);

  var ctx=cv.getContext("2d");
  var player={x:W/2,y:H-40,size:20,dx:0,dy:0,speed:3,penalty:false,penaltyEnd:0};
  var beasts=[],coins=[],arovScore=0,arovRunning=true;
  var lives=3;

  for(var i=0;i<4;i++){
    beasts.push({x:Math.random()*W,y:Math.random()*H/2,size:22,dx:(Math.random()-0.5)*3,dy:(Math.random()-0.5)*3});
  }
  function spawnCoin(){if(coins.length<8)coins.push({x:30+Math.random()*(W-60),y:30+Math.random()*(H-60),size:14});}
  for(var k=0;k<6;k++)spawnCoin();

  function pressDir(dx,dy){player.dx=dx;player.dy=dy;}
  function relDir(){player.dx=0;player.dy=0;}

  document.getElementById("au").ontouchstart=function(e){e.preventDefault();pressDir(0,-1);};
  document.getElementById("ad").ontouchstart=function(e){e.preventDefault();pressDir(0,1);};
  document.getElementById("al").ontouchstart=function(e){e.preventDefault();pressDir(1,0);};
  document.getElementById("ar").ontouchstart=function(e){e.preventDefault();pressDir(-1,0);};
  document.getElementById("au").ontouchend=relDir;document.getElementById("ad").ontouchend=relDir;
  document.getElementById("al").ontouchend=relDir;document.getElementById("ar").ontouchend=relDir;
  document.getElementById("au").onmousedown=function(){pressDir(0,-1);};
  document.getElementById("ad").onmousedown=function(){pressDir(0,1);};
  document.getElementById("al").onmousedown=function(){pressDir(1,0);};
  document.getElementById("ar").onmousedown=function(){pressDir(-1,0);};
  document.addEventListener("mouseup",relDir);

  var arovLoop2=true;
  function arovLoop(){
    if(!arovLoop2)return;
    if(player.penalty){if(Date.now()>player.penaltyEnd)player.penalty=false;}
    else{player.x=Math.max(player.size,Math.min(W-player.size,player.x+player.dx*player.speed));player.y=Math.max(player.size,Math.min(H-player.size,player.y+player.dy*player.speed));}
    beasts.forEach(function(b){
      b.x+=b.dx;b.y+=b.dy;
      if(b.x<b.size||b.x>W-b.size)b.dx*=-1;
      if(b.y<b.size||b.y>H-b.size)b.dy*=-1;
      // Collision with player
      if(Math.hypot(b.x-player.x,b.y-player.y)<b.size+player.size&&!player.penalty){player.penalty=true;player.penaltyEnd=Date.now()+5000;player.x=W/2;player.y=H-40;player.dx=0;player.dy=0;}
    });

    // Collect coins

      var g2=ghosts2[ii];
      if(Math.abs(g2.x-pac2.x)<1&&Math.abs(g2.y-pac2.y)<1){
        if(g2.sc){g2.x=10;g2.y=9;g2.sc=false;pacScore+=80;addScore(80);scoreEl.textContent="ניקוד: "+myStageScore;}
        else{pac2.x=10;pac2.y=15;pac2.dx=0;pac2.dy=0;return;}
      }
    }
  }
  function chkW2(){for(var y2=0;y2<RO;y2++)for(var x2=0;x2<CO;x2++)if(grid2[y2][x2]===0||grid2[y2][x2]===2)return false;return true;}

  function drawP(){
    ctx.fillStyle="#000";ctx.fillRect(0,0,cv.width,cv.height);
    for(var y3=0;y3<RO;y3++)for(var x3=0;x3<CO;x3++){
      var c3=grid2[y3][x3],px3=x3*T,py3=y3*T;
      if(c3===1){ctx.fillStyle="#1133cc";ctx.fillRect(px3,py3,T,T);ctx.strokeStyle="#2244ee";ctx.lineWidth=.7;ctx.strokeRect(px3+1,py3+1,T-2,T-2);}
      else if(c3===0){ctx.font="10px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("\uD83C\uDF28",px3+T/2,py3+T/2);}
      else if(c3===2){var pp2=.7+.3*Math.sin(Date.now()/200);ctx.globalAlpha=pp2;ctx.font="11px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("\uD83E\uDD6F",px3+T/2,py3+T/2);ctx.globalAlpha=1;}
    }
    var px4=pac2.x*T+T/2,py4=pac2.y*T+T/2,r2=T/2-1;
    var dir2=0;if(pac2.dx===1)dir2=0;else if(pac2.dx===-1)dir2=Math.PI;else if(pac2.dy===1)dir2=Math.PI/2;else if(pac2.dy===-1)dir2=-Math.PI/2;
    ctx.save();ctx.translate(px4,py4);ctx.rotate(dir2);
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r2,pac2.mx+.05,Math.PI*2-pac2.mx-.05);ctx.closePath();ctx.clip();
    ctx.fillStyle="#D4956A";ctx.fillRect(-r2,-r2,r2*2,r2*2);
    ctx.fillStyle="#4A3728";ctx.fillRect(-r2,-r2,r2*2,r2*.5);
    ctx.fillStyle="#fff";ctx.beginPath();ctx.ellipse(-r2*.28,-r2*.05,r2*.15,r2*.11,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(r2*.28,-r2*.05,r2*.15,r2*.11,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#222";ctx.beginPath();ctx.arc(-r2*.28,-r2*.05,r2*.07,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(r2*.28,-r2*.05,r2*.07,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.save();ctx.translate(px4,py4);ctx.rotate(dir2);
    ctx.strokeStyle="#FFD700";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r2,pac2.mx+.05,Math.PI*2-pac2.mx-.05);ctx.closePath();ctx.stroke();ctx.restore();
    for(var ii2=0;ii2<ghosts2.length;ii2++){
      var g3=ghosts2[ii2];var gx2=g3.x*T+T/2,gy3=g3.y*T+T/2,gr3=T/2-1;
      if(g3.sc)ctx.fillStyle=(pt2<25&&Math.floor(pt2/4)%2===0)?"#fff":"#0033cc";
      else ctx.fillStyle=GC2[g3.i];
      ctx.beginPath();ctx.arc(gx2,gy3-1,gr3,Math.PI,0);ctx.lineTo(gx2+gr3,gy3+gr3);
      for(var ww=3;ww>=0;ww--)ctx.arc(gx2-gr3+gr3*(4-ww)*.5+gr3*.25,gy3+gr3,gr3*.25,0,Math.PI,true);
      ctx.lineTo(gx2-gr3,gy3-1);ctx.fill();
      // Pharaoh face on ghost
      ctx.font=Math.round(T*.7)+"px serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(g3.sc?"\uD83D\uDE30":"\uD83E\uDDD4",gx2,gy3-1);
    }
    if(pt2>0){ctx.fillStyle="#00ff88";ctx.fillRect(0,RO*T-2,(pt2/90)*(CO*T),2);}
  }

  var pacRunLoop=true;
  function pacLoop(){
    if(!pacRunLoop)return;
    if(pt2>0){pt2--;if(pt2===0)for(var ii3=0;ii3<ghosts2.length;ii3++)ghosts2[ii3].sc=false;}
    movP();if(tick2%2===0)for(var jj2=0;jj2<ghosts2.length;jj2++)movG2(ghosts2[jj2]);
    chkC2();if(chkW2())initPacState();
    tick2++;drawP();
    if(pacRunLoop)gameLoopTimer=setTimeout(pacLoop,100);
  }
  pacLoop();

  // Controls — FIXED left/right for mobile
  document.getElementById("pu").ontouchstart=function(e){e.preventDefault();pac2.nx=0;pac2.ny=-1;};
  document.getElementById("pd").ontouchstart=function(e){e.preventDefault();pac2.nx=0;pac2.ny=1;};
  document.getElementById("pl").ontouchstart=function(e){e.preventDefault();pac2.nx=1;pac2.ny=0;};
  document.getElementById("pr").ontouchstart=function(e){e.preventDefault();pac2.nx=-1;pac2.ny=0;};
  document.getElementById("pu").onmousedown=function(){pac2.nx=0;pac2.ny=-1;};
  document.getElementById("pd").onmousedown=function(){pac2.nx=0;pac2.ny=1;};
  document.getElementById("pl").onmousedown=function(){pac2.nx=1;pac2.ny=0;};
  document.getElementById("pr").onmousedown=function(){pac2.nx=-1;pac2.ny=0;};

  var origStop7=stopGameLoop;
  stopGameLoop=function(){pacRunLoop=false;if(gameLoopTimer)clearTimeout(gameLoopTimer);origStop7();};
}

// ════════════════════════════════════════════════════════════
// GAME 8: SPACE — Shoot the locusts
// ════════════════════════════════════════════════════════════
function initSpace(area){
  var W=320,H=380;
  var cv=document.createElement("canvas");cv.id="space-canvas";cv.width=W;cv.height=H;
  var s2=Math.min(340,(window.innerWidth-20))/W;
  cv.style.width=(W*s2)+"px";cv.style.height=(H*s2)+"px";
  var scoreEl=document.createElement("div");scoreEl.style.cssText="color:#FFD700;font-size:18px;font-weight:bold;";scoreEl.textContent="ניקוד: 0";
  area.appendChild(scoreEl);area.appendChild(cv);

  var ctx=cv.getContext("2d");
  var ship={x:W/2,y:H-40,w:30,speed:5,dx:0};
  var bullets=[],enemies=[],spaceScore=0,spaceRunning=true;
  var lastFire=0,enemySpeed=1,wave=0;

  function spawnWave(){
    wave++;enemySpeed+=0.3;
    for(var ei=0;ei<5+wave;ei++){
      enemies.push({x:30+ei*(W/6),y:20+Math.random()*60,w:24,dx:enemySpeed*(Math.random()>0.5?1:-1),alive:true});
    }
  }
  spawnWave();

  // Touch/mouse controls
  var touchX=null;
  cv.addEventListener("touchstart",function(e){e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
  cv.addEventListener("touchmove",function(e){e.preventDefault();var dx2=e.touches[0].clientX-touchX;touchX=e.touches[0].clientX;ship.x=Math.max(ship.w,Math.min(W-ship.w,ship.x+dx2*1.2));},{passive:false});
  cv.addEventListener("touchend",function(e){e.preventDefault();fireBullet();},{passive:false});
  cv.addEventListener("mousedown",function(e){
    var rect=cv.getBoundingClientRect();
    var mx2=(e.clientX-rect.left)*(W/rect.width);
    ship.x=mx2;fireBullet();
  });
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowLeft")ship.dx=-1;if(e.key==="ArrowRight")ship.dx=1;
    if(e.key===" ")fireBullet();
  });
  document.addEventListener("keyup",function(e){if(e.key==="ArrowLeft"||e.key==="ArrowRight")ship.dx=0;});

  function fireBullet(){
    var now=Date.now();
    if(now-lastFire<300)return;lastFire=now;
    bullets.push({x:ship.x,y:ship.y-20,speed:8,alive:true});
  }

  // Auto-fire every 600ms
  var autoFire=setInterval(fireBullet,600);

  var spaceLoop2=true;
  function spaceLoop(){
    if(!spaceLoop2)return;
    ship.x=Math.max(ship.w,Math.min(W-ship.w,ship.x+ship.dx*ship.speed));
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle="#fff";
    for(var si=0;si<30;si++){
      var sx=(si*97+Date.now()*0.02)%W,sy=(si*73+Date.now()*0.01)%H;
      ctx.fillRect(sx,sy,1,1);
    }
    // Bullets
    ctx.fillStyle="#FFD700";
    for(var bi=bullets.length-1;bi>=0;bi--){
      bullets[bi].y-=bullets[bi].speed;
      if(bullets[bi].y<0){bullets.splice(bi,1);continue;}
      ctx.fillRect(bullets[bi].x-2,bullets[bi].y,4,10);
    }
    // Enemies (locusts)
    ctx.font="24px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    for(var ei2=enemies.length-1;ei2>=0;ei2--){
      var en=enemies[ei2];
      if(!en.alive){enemies.splice(ei2,1);continue;}
      en.x+=en.dx;
      if(en.x<en.w||en.x>W-en.w)en.dx*=-1;
      en.y+=0.3;
      // Hit check
      for(var bi2=bullets.length-1;bi2>=0;bi2--){
        if(Math.abs(bullets[bi2].x-en.x)<en.w&&Math.abs(bullets[bi2].y-en.y)<en.w){
          en.alive=false;bullets.splice(bi2,1);
          spaceScore+=25;addScore(25);scoreEl.textContent="ניקוד: "+myStageScore;break;
        }
      }
      if(en.alive)ctx.fillText("\uD83E\uDEB2",en.x,en.y);
      // Enemy reaches bottom
      if(en.y>H-50){en.alive=false;}
    }
    if(enemies.every(function(e2){return !e2.alive;})){spawnWave();}

    // Ship
    ctx.font="32px serif";ctx.fillText("\uD83D\uDE80",ship.x,ship.y);
    gameLoopTimer=requestAnimationFrame(spaceLoop);
  }
  spaceLoop();
  var origStop8=stopGameLoop;
  stopGameLoop=function(){spaceLoop2=false;clearInterval(autoFire);if(gameLoopTimer)cancelAnimationFrame(gameLoopTimer);origStop8();};
}

// ════════════════════════════════════════════════════════════
// GAME 9: MAZE
// ════════════════════════════════════════════════════════════
function initMaze(area){
  var COLS2=15,ROWS2=15,CS=22;
  var W=COLS2*CS,H=ROWS2*CS;
  var cv=document.createElement("canvas");cv.id="maze-canvas";cv.width=W;cv.height=H;
  var s3=Math.min(340,(window.innerWidth-20))/W;
  cv.style.width=(W*s3)+"px";cv.style.height=(H*s3)+"px";
  var scoreEl=document.createElement("div");scoreEl.style.cssText="color:#aaaaff;font-size:18px;font-weight:bold;";scoreEl.textContent="ניקוד: 0 | סיבובים: 0";
  area.appendChild(scoreEl);area.appendChild(cv);

  var dpad2=document.createElement("div");dpad2.id="maze-dpad";
  dpad2.innerHTML="<div class='mde'></div><div class='mdb' id='mu'>&#9650;</div><div class='mde'></div><div class='mdb' id='mll'>&#9654;</div><div class='mde'></div><div class='mdb' id='mr'>&#9664;</div><div class='mde'></div><div class='mdb' id='md2'>&#9660;</div><div class='mde'></div>";
  area.appendChild(dpad2);

  var ctx=cv.getContext("2d");
  var mazeGrid=[];var mazeScore=0,mazeSolves=0;

  function generateMaze(){
    mazeGrid=[];
    for(var ym=0;ym<ROWS2;ym++){var row=[];for(var xm=0;xm<COLS2;xm++)row.push({wall:true,visited:false});mazeGrid.push(row);}
    function carve(x,y){
      mazeGrid[y][x].visited=true;mazeGrid[y][x].wall=false;
      var dirs3=[[0,-2],[0,2],[-2,0],[2,0]];
      for(var i2=dirs3.length-1;i2>0;i2--){var j3=Math.floor(Math.random()*(i2+1));var t3=dirs3[i2];dirs3[i2]=dirs3[j3];dirs3[j3]=t3;}
      dirs3.forEach(function(d3){
        var nx2=x+d3[0],ny2=y+d3[1];
        if(nx2>=0&&nx2<COLS2&&ny2>=0&&ny2<ROWS2&&!mazeGrid[ny2][nx2].visited){
          mazeGrid[y+d3[1]/2][x+d3[0]/2].wall=false;carve(nx2,ny2);
        }
      });
    }
    carve(1,1);
    mazeGrid[0][1].wall=false;mazeGrid[ROWS2-1][COLS2-2].wall=false;
  }

  var player2={x:1,y:1};
  generateMaze();

  function drawMaze(){
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    for(var ym2=0;ym2<ROWS2;ym2++)for(var xm2=0;xm2<COLS2;xm2++){
      ctx.fillStyle=mazeGrid[ym2][xm2].wall?"#2244aa":"#001133";
      ctx.fillRect(xm2*CS,ym2*CS,CS,CS);
    }
    // Exit
    ctx.fillStyle="#44ff88";ctx.fillRect((COLS2-2)*CS+2,(ROWS2-1)*CS+2,CS-4,CS-4);
    ctx.font="14px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("\uD83D\uDEAA",(COLS2-2)*CS+CS/2,(ROWS2-1)*CS+CS/2);
    // Player
    ctx.font="16px serif";ctx.fillText("\uD83D\uDC66\uD83C\uDFFB",player2.x*CS+CS/2,player2.y*CS+CS/2);
    // Torch effect (darkness)
    var grd=ctx.createRadialGradient(player2.x*CS+CS/2,player2.y*CS+CS/2,CS*1.5,player2.x*CS+CS/2,player2.y*CS+CS/2,CS*4);
    grd.addColorStop(0,"rgba(0,0,0,0)");grd.addColorStop(1,"rgba(0,0,0,0.75)");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  function tryMove(dx2,dy2){
    var nx3=player2.x+dx2,ny3=player2.y+dy2;
    if(nx3>=0&&nx3<COLS2&&ny3>=0&&ny3<ROWS2&&!mazeGrid[ny3][nx3].wall){
      player2.x=nx3;player2.y=ny3;
      if(player2.x===COLS2-2&&player2.y===ROWS2-1){
        mazeSolves++;mazeScore+=100;addScore(100);
        scoreEl.textContent="ניקוד: "+myStageScore+" | סיבובים: "+mazeSolves;
        player2={x:1,y:1};generateMaze();
      }
      drawMaze();
    }
  }

  document.getElementById("mu").ontouchstart=function(e){e.preventDefault();tryMove(0,-1);};
  document.getElementById("md2").ontouchstart=function(e){e.preventDefault();tryMove(0,1);};
  document.getElementById("mll").ontouchstart=function(e){e.preventDefault();tryMove(1,0);};
  document.getElementById("mr").ontouchstart=function(e){e.preventDefault();tryMove(-1,0);};
  document.getElementById("mu").onmousedown=function(){tryMove(0,-1);};
  document.getElementById("md2").onmousedown=function(){tryMove(0,1);};
  document.getElementById("mll").onmousedown=function(){tryMove(1,0);};
  document.getElementById("mr").onmousedown=function(){tryMove(-1,0);};
  document.addEventListener("keydown",function(e2){
    if(e2.key==="ArrowUp")tryMove(0,-1);if(e2.key==="ArrowDown")tryMove(0,1);
    if(e2.key==="ArrowLeft")tryMove(-1,0);if(e2.key==="ArrowRight")tryMove(1,0);
  });
  drawMaze();
}

// ── Main poll ─────────────────────────────────────────────────
pollStatus();
</script>
